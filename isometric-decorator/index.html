<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isometric Decorator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #titlebar {
    background: #16213e;
    padding: 8px 16px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #e2b96f;
    border-bottom: 2px solid #0f3460;
    flex-shrink: 0;
  }

  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #palette {
    width: 180px;
    background: #16213e;
    border-right: 2px solid #0f3460;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  #palette h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid #0f3460;
  }

  .palette-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #0f3460;
    border-radius: 6px;
    cursor: grab;
    user-select: none;
    transition: background 0.15s;
    border: 2px solid transparent;
  }
  .palette-item:hover { background: #1a4a7a; border-color: #4a90d9; }
  .palette-item:active { cursor: grabbing; }
  .palette-item.dragging-source { opacity: 0.5; }

  .palette-thumb {
    width: 48px;
    height: 48px;
    object-fit: contain;
    object-position: center bottom;
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  .palette-label { font-size: 13px; }
  .palette-dims { font-size: 10px; color: #888; }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    overflow: hidden;
  }

  #gameCanvas {
    display: block;
    cursor: default;
  }

  #statusbar {
    background: #16213e;
    border-top: 2px solid #0f3460;
    padding: 5px 16px;
    font-size: 12px;
    color: #aaa;
    display: flex;
    gap: 24px;
    flex-shrink: 0;
  }
  #statusbar span { color: #e2b96f; }

  #toolbar {
    background: #16213e;
    border-bottom: 2px solid #0f3460;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #toolbar button {
    background: #0f3460;
    color: #eee;
    border: 1px solid #1a4a7a;
    border-radius: 4px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  #toolbar button:hover:not(:disabled) { background: #1a4a7a; }
  #toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
  .tb-sep { width: 1px; height: 22px; background: #0f3460; margin: 0 4px; }
  #toolbar label { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 5px; }
  #toolbar input[type="color"] { width: 32px; height: 24px; padding: 1px; border: 1px solid #1a4a7a; border-radius: 3px; cursor: pointer; background: none; }

  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 200;
    align-items: center; justify-content: center;
  }
  #modal {
    background: #16213e; border: 2px solid #0f3460; border-radius: 8px;
    padding: 20px 24px; min-width: 340px; display: flex; flex-direction: column; gap: 8px;
  }
  .modal-title { font-size: 15px; font-weight: bold; color: #e2b96f; margin-bottom: 4px; }
  .modal-btn {
    background: #0f3460; color: #eee; border: 1px solid #1a4a7a;
    border-radius: 5px; padding: 9px 14px; cursor: pointer; font-size: 13px; text-align: left;
  }
  .modal-btn:hover:not(:disabled) { background: #1a4a7a; }
  .modal-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .modal-cancel { background: #1a0a0a; border-color: #5a1a1a; }
  .modal-cancel:hover { background: #2a1010 !important; }
</style>
</head>
<body>

<div id="titlebar">⬡ Isometric Decorator</div>

<div id="toolbar">
  <button id="btn-undo" disabled>↶ Undo</button>
  <button id="btn-redo" disabled>↷ Redo</button>
  <div class="tb-sep"></div>
  <label>🎨 Left Wall: <input type="color" id="color-wall-left"  value="#A89078"></label>
  <label>Right Wall: <input type="color" id="color-wall-right" value="#D4BC92"></label>
  <label>Floor: <input type="color" id="color-floor"      value="#E8D5A9"></label>
  <div class="tb-sep"></div>
  <button id="btn-save">💾 Save</button>
  <button id="btn-load">📂 Load</button>
  <button id="btn-clear">🗑️ Clear</button>
</div>

<div id="main">
  <div id="palette">
    <h3>Furniture</h3>
    <div class="palette-item" data-type="rug">
      <img class="palette-thumb" src="https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/rugSquare_SE.png" alt="Rug">
      <div><div class="palette-label">Rug</div><div class="palette-dims">2×2</div></div>
    </div>
    <div class="palette-item" data-type="chair">
      <img class="palette-thumb" src="https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/chair_SE.png" alt="Chair">
      <div><div class="palette-label">Chair</div><div class="palette-dims">1×1</div></div>
    </div>
    <div class="palette-item" data-type="table">
      <img class="palette-thumb" src="https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/table_SE.png" alt="Table">
      <div><div class="palette-label">Table</div><div class="palette-dims">2×1</div></div>
    </div>
    <div class="palette-item" data-type="bed">
      <img class="palette-thumb" src="https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/bedDouble_SE.png" alt="Bed">
      <div><div class="palette-label">Bed</div><div class="palette-dims">2×3</div></div>
    </div>
    <div class="palette-item" data-type="wardrobe">
      <img class="palette-thumb" src="https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/bookcaseClosed_SE.png" alt="Wardrobe">
      <div><div class="palette-label">Wardrobe</div><div class="palette-dims">1×2</div></div>
    </div>
    <div class="palette-item" data-type="plant">
      <img class="palette-thumb" src="https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/pottedPlant_SE.png" alt="Plant">
      <div><div class="palette-label">Plant</div><div class="palette-dims">1×1</div></div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal"></div>
</div>

<div id="statusbar">
  <div>Tile: <span id="stat-tile">-, -</span></div>
  <div>Placed: <span id="stat-count">0</span></div>
  <div id="stat-hint">Click palette to place furniture</div>
</div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const TILE_WIDTH  = 94;   // Kenney asset tile width  (188 / 2)
const TILE_HEIGHT = 67;   // Kenney asset tile height (134 / 2)
const ROOM_SIZE   = 10;
const OFFSET_X    = 512;
const OFFSET_Y    = 97;
const WALL_HEIGHT = 96;

const FURNITURE_DEFS = {
  rug:      { w: 2, d: 2, h: 2,  color: '#4A90E2', label: 'Rug',      isRug: true, spriteName: 'rugSquare'                                                                                      },
  chair:    { w: 1, d: 1, h: 32, color: '#7ED321', label: 'Chair',                 spriteName: 'chair'                                                                                          },
  table:    { w: 2, d: 1, h: 26, color: '#D0021B', label: 'Table',                 spriteName: 'table',        dirMap: { 0: 'NW', 90: 'NE', 180: 'SE', 270: 'SW' }, tilePivot: { w: 0.5, d: 0.5 } },
  bed:      { w: 3, d: 3, h: 20, color: '#9013FE', label: 'Bed',                   spriteName: 'bedDouble'                                                                                      },
  wardrobe: { w: 1, d: 1, h: 64, color: '#F5A623', label: 'Wardrobe',              spriteName: 'bookcaseClosed'                                                                                 },
  plant:    { w: 1, d: 1, h: 48, color: '#50E3C2', label: 'Plant',                 spriteName: 'pottedPlant',  spriteYOffset: -34                                                               },
};

// ─────────────────────────────────────────────
// SPRITE LOADER
// ─────────────────────────────────────────────
class SpriteLoader {
  constructor() {
    this.cache   = {};
    this.ready   = false;
    this._total  = 0;
    this._done   = 0;
  }

  load(type, directions, basePath) {
    this.cache[type] = {};
    for (const dir of directions) {
      this._total++;
      const img = new Image();
      img.onload = () => { this._done++; this._check(); };
      img.onerror = () => {
        console.error(`Sprite load failed: ${basePath}${type}_${dir}.png`);
        this.cache[type][dir] = null;
        this._done++;
        this._check();
      };
      this.cache[type][dir] = img;
      img.src = `${basePath}${type}_${dir}.png`;
    }
  }

  _check() { if (this._done >= this._total) this.ready = true; }

  get(type, dir) { return this.cache[type]?.[dir] ?? null; }
}

// ─────────────────────────────────────────────
// COORD SYSTEM
// ─────────────────────────────────────────────
class CoordSystem {
  toScreen(isoX, isoY, isoZ = 0) {
    return {
      x: (isoX - isoY) * (TILE_WIDTH  / 2) + OFFSET_X,
      y: (isoX + isoY) * (TILE_HEIGHT / 2) - isoZ    + OFFSET_Y,
    };
  }

  toIso(mouseX, mouseY) {
    const sx = mouseX - OFFSET_X;
    const sy = mouseY - OFFSET_Y;
    const rawX = (sx / (TILE_WIDTH / 2) + sy / (TILE_HEIGHT / 2)) / 2;
    const rawY = (sy / (TILE_HEIGHT / 2) - sx / (TILE_WIDTH / 2)) / 2;
    return { x: Math.floor(rawX), y: Math.floor(rawY), rawX, rawY };
  }

  inBounds(x, y, w = 1, d = 1) {
    return x >= 0 && y >= 0 && x + w <= ROOM_SIZE && y + d <= ROOM_SIZE;
  }
}

// ─────────────────────────────────────────────
// COMMANDS
// ─────────────────────────────────────────────
class PlaceCommand {
  constructor(type, x, y, z, rotation) {
    this.f = new Furniture(type, x, y, z);
    this.f.rotation = rotation;
  }
  execute() { furnitures.push(this.f); refreshCollision(); }
  undo() {
    furnitures.splice(furnitures.indexOf(this.f), 1);
    if (selectedId === this.f.id) selectedId = null;
    refreshCollision();
  }
}

class MoveCommand {
  constructor(f, fx, fy, fz, frot, tx, ty, tz, trot) {
    this.f = f;
    this.from = { x: fx, y: fy, z: fz, rot: frot };
    this.to   = { x: tx, y: ty, z: tz, rot: trot };
  }
  execute() { this.f.x = this.to.x;   this.f.y = this.to.y;   this.f.z = this.to.z;   this.f.rotation = this.to.rot; }
  undo()    { this.f.x = this.from.x; this.f.y = this.from.y; this.f.z = this.from.z; this.f.rotation = this.from.rot; }
}

class DeleteCommand {
  constructor(f) { this.f = f; this._idx = -1; }
  execute() {
    this._idx = furnitures.indexOf(this.f);
    furnitures.splice(this._idx, 1);
    if (selectedId === this.f.id) selectedId = null;
    refreshCollision();
  }
  undo() { furnitures.splice(this._idx, 0, this.f); refreshCollision(); }
}

class RotateCommand {
  constructor(f, from, to) { this.f = f; this.from = from; this.to = to; }
  execute() { this.f.rotation = this.to; }
  undo()    { this.f.rotation = this.from; }
}

class ChangeWallColorCommand {
  constructor(side, from, to) { this.side = side; this.from = from; this.to = to; }
  _apply(c) {
    if (this.side === 'left') roomColors.wallLeft = c; else roomColors.wallRight = c;
    syncColorInputs();
  }
  execute() { this._apply(this.to); }
  undo()    { this._apply(this.from); }
}

class ChangeFloorColorCommand {
  constructor(from, to) { this.from = from; this.to = to; }
  execute() { roomColors.floor = this.to;   syncColorInputs(); }
  undo()    { roomColors.floor = this.from; syncColorInputs(); }
}

class ClearCommand {
  constructor() { this._snapshot = [...furnitures]; }
  execute() { furnitures.length = 0; selectedId = null; refreshCollision(); }
  undo()    { furnitures.length = 0; furnitures.push(...this._snapshot); refreshCollision(); }
}

// ─────────────────────────────────────────────
// COMMAND HISTORY
// ─────────────────────────────────────────────
class CommandHistory {
  constructor() { this.undoStack = []; this.redoStack = []; }

  execute(cmd) {
    cmd.execute();
    this.undoStack.push(cmd);
    if (this.undoStack.length > 50) this.undoStack.shift();
    this.redoStack = [];
    scheduleAutosave();
    syncToolbar();
  }
  undo() {
    if (!this.undoStack.length) return;
    const cmd = this.undoStack.pop();
    cmd.undo();
    this.redoStack.push(cmd);
    scheduleAutosave();
    syncToolbar();
  }
  redo() {
    if (!this.redoStack.length) return;
    const cmd = this.redoStack.pop();
    cmd.execute();
    this.undoStack.push(cmd);
    scheduleAutosave();
    syncToolbar();
  }
  clear() { this.undoStack = []; this.redoStack = []; syncToolbar(); }
  canUndo() { return this.undoStack.length > 0; }
  canRedo() { return this.redoStack.length > 0; }
}

// ─────────────────────────────────────────────
// FURNITURE
// ─────────────────────────────────────────────
let _nextId = 1;
class Furniture {
  constructor(type, tileX, tileY, baseZ = 0) {
    this.id       = _nextId++;
    this.type     = type;
    const def     = FURNITURE_DEFS[type];
    this.w        = def.w;
    this.d        = def.d;
    this.h        = def.h;
    this.color    = def.color;
    this.isRug    = !!def.isRug;
    this.sprite   = null; // future: image element
    this.x        = tileX;
    this.y        = tileY;
    this.z        = baseZ;
    this.rotation = 0; // 0 / 90 / 180 / 270
  }

  get effectiveW() { return (this.rotation === 90 || this.rotation === 270) ? this.d : this.w; }
  get effectiveD() { return (this.rotation === 90 || this.rotation === 270) ? this.w : this.d; }

  tiles() {
    const list = [];
    for (let dx = 0; dx < this.effectiveW; dx++)
      for (let dy = 0; dy < this.effectiveD; dy++)
        list.push({ x: this.x + dx, y: this.y + dy });
    return list;
  }

  sortKey() { return this.x + this.y + this.z / TILE_HEIGHT; }
}

// ─────────────────────────────────────────────
// COLLISION SYSTEM
// ─────────────────────────────────────────────
class CollisionSystem {
  constructor(furnitureList) { this.list = furnitureList; }

  // Returns baseZ for placing a piece, or -1 if blocked
  getPlacementZ(type, tileX, tileY, rotation, excludeId = null) {
    const def = FURNITURE_DEFS[type];
    let w = def.w, d = def.d;
    if (rotation === 90 || rotation === 270) { [w, d] = [d, w]; }

    if (!coords.inBounds(tileX, tileY, w, d)) return -1;

    const tiles = [];
    for (let dx = 0; dx < w; dx++)
      for (let dy = 0; dy < d; dy++)
        tiles.push({ x: tileX + dx, y: tileY + dy });

    let baseZ = 0;
    for (const f of this.list) {
      if (f.id === excludeId) continue;
      for (const ft of f.tiles()) {
        for (const t of tiles) {
          if (ft.x === t.x && ft.y === t.y) {
            if (f.isRug) continue;       // rugs are floor-level, no collision
            if (def.isRug) return -1;    // can't place rug on top of something
            const top = f.z + f.h;
            if (top > baseZ) baseZ = top;
          }
        }
      }
    }
    // Check actual overlap at same Z layer after resolving baseZ
    for (const f of this.list) {
      if (f.id === excludeId) continue;
      if (f.isRug) continue;
      const fTop = f.z + f.h;
      const newTop = baseZ + def.h;
      // Overlap in Z range?
      const zOverlap = !(baseZ >= fTop || newTop <= f.z);
      if (!zOverlap) continue;
      for (const ft of f.tiles()) {
        for (const t of tiles) {
          if (ft.x === t.x && ft.y === t.y) return -1;
        }
      }
    }
    return baseZ;
  }
}

// ─────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────
class Renderer {
  constructor(ctx) { this.ctx = ctx; }

  clear() {
    this.ctx.clearRect(0, 0, 1024, 768);
    this.ctx.fillStyle = '#0d1117';
    this.ctx.fillRect(0, 0, 1024, 768);
  }

  drawFloor(hoverTile) {
    const ctx = this.ctx;
    for (let x = 0; x < ROOM_SIZE; x++) {
      for (let y = 0; y < ROOM_SIZE; y++) {
        const s = coords.toScreen(x, y, 0);
        const hw = TILE_WIDTH / 2, hh = TILE_HEIGHT / 2;

        // Anchor at back corner: corners are toScreen(x,y), (x+1,y), (x+1,y+1), (x,y+1)
        ctx.beginPath();
        ctx.moveTo(s.x,      s.y);         // back  (x,   y  )
        ctx.lineTo(s.x + hw, s.y + hh);    // right (x+1, y  )
        ctx.lineTo(s.x,      s.y + hh * 2);// front (x+1, y+1)
        ctx.lineTo(s.x - hw, s.y + hh);    // left  (x,   y+1)
        ctx.closePath();

        const isHover = hoverTile && hoverTile.x === x && hoverTile.y === y;
        ctx.fillStyle = isHover ? '#FFEB3B50' : roomColors.floor;
        ctx.fill();
        ctx.strokeStyle = '#00000020';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  drawWalls() {
    const ctx = this.ctx;
    const H = WALL_HEIGHT;

    // Left wall: along x-axis (y=0), x from 0..ROOM_SIZE
    ctx.fillStyle = roomColors.wallLeft;
    for (let x = 0; x < ROOM_SIZE; x++) {
      const bot = coords.toScreen(x, 0, 0);
      const top = coords.toScreen(x, 0, H);
      const botR = coords.toScreen(x + 1, 0, 0);
      const topR = coords.toScreen(x + 1, 0, H);
      ctx.beginPath();
      ctx.moveTo(bot.x, bot.y);
      ctx.lineTo(botR.x, botR.y);
      ctx.lineTo(topR.x, topR.y);
      ctx.lineTo(top.x, top.y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#00000030';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Right wall: along y-axis (x=0), y from 0..ROOM_SIZE
    ctx.fillStyle = roomColors.wallRight;
    for (let y = 0; y < ROOM_SIZE; y++) {
      const bot = coords.toScreen(0, y, 0);
      const top = coords.toScreen(0, y, H);
      const botR = coords.toScreen(0, y + 1, 0);
      const topR = coords.toScreen(0, y + 1, H);
      ctx.beginPath();
      ctx.moveTo(bot.x, bot.y);
      ctx.lineTo(botR.x, botR.y);
      ctx.lineTo(topR.x, topR.y);
      ctx.lineTo(top.x, top.y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#00000030';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Hex color helpers
  _hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }
  _darken(hex, factor) {
    const [r,g,b] = this._hexToRgb(hex);
    return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
  }

  drawCube(isoX, isoY, isoZ, widthTiles, depthTiles, heightPx, color, options = {}) {
    const ctx = this.ctx;
    const alpha = options.preview ? 0.5 : 1.0;
    ctx.globalAlpha = alpha;

    const w = widthTiles, d = depthTiles, h = heightPx;

    // Corners in iso space → screen
    // Bottom face corners (z = isoZ)
    const p00b = coords.toScreen(isoX,     isoY,     isoZ);
    const p10b = coords.toScreen(isoX + w, isoY,     isoZ);
    const p11b = coords.toScreen(isoX + w, isoY + d, isoZ);
    const p01b = coords.toScreen(isoX,     isoY + d, isoZ);
    // Top face corners (z = isoZ + h)
    const p00t = coords.toScreen(isoX,     isoY,     isoZ + h);
    const p10t = coords.toScreen(isoX + w, isoY,     isoZ + h);
    const p11t = coords.toScreen(isoX + w, isoY + d, isoZ + h);
    const p01t = coords.toScreen(isoX,     isoY + d, isoZ + h);

    // Left face (x+w side, facing viewer-left = isoY direction)
    ctx.fillStyle = this._darken(color, 0.7);
    ctx.beginPath();
    ctx.moveTo(p10b.x, p10b.y);
    ctx.lineTo(p11b.x, p11b.y);
    ctx.lineTo(p11t.x, p11t.y);
    ctx.lineTo(p10t.x, p10t.y);
    ctx.closePath();
    ctx.fill();

    // Right face (y+d side)
    ctx.fillStyle = this._darken(color, 0.85);
    ctx.beginPath();
    ctx.moveTo(p11b.x, p11b.y);
    ctx.lineTo(p01b.x, p01b.y);
    ctx.lineTo(p01t.x, p01t.y);
    ctx.lineTo(p11t.x, p11t.y);
    ctx.closePath();
    ctx.fill();

    // Top face
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(p00t.x, p00t.y);
    ctx.lineTo(p10t.x, p10t.y);
    ctx.lineTo(p11t.x, p11t.y);
    ctx.lineTo(p01t.x, p01t.y);
    ctx.closePath();
    ctx.fill();

    ctx.globalAlpha = 1.0;

    // Outline
    if (options.selected || options.valid === true || options.valid === false) {
      let strokeColor;
      if (options.selected)      strokeColor = '#FFEB3B';
      else if (options.valid)    strokeColor = '#4CAF50';
      else                        strokeColor = '#F44336';

      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = options.selected ? 3 : 2;
      ctx.globalAlpha = options.preview ? 0.8 : 1.0;

      // Draw outline around top + visible edges
      const outline = [p00t, p10t, p11t, p01t];
      ctx.beginPath();
      ctx.moveTo(outline[0].x, outline[0].y);
      for (let i = 1; i < outline.length; i++) ctx.lineTo(outline[i].x, outline[i].y);
      ctx.closePath();
      ctx.stroke();

      // Vertical edges
      [[p10b,p10t],[p11b,p11t],[p01b,p01t]].forEach(([a,b]) => {
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      });
      ctx.globalAlpha = 1.0;
    }
  }

  _rotToDir(rotation, dirMap) {
    const map = dirMap || { 0: 'SE', 90: 'SW', 180: 'NW', 270: 'NE' };
    return map[rotation] || map[0];
  }

  drawSprite(img, isoX, isoY, isoZ, effectiveW, effectiveD, options = {}) {
    const ctx = this.ctx;

    // Anchor: bottom-center of sprite → tile pivot (default: front vertex)
    const tp     = options.tilePivot || { w: 1, d: 1 };
    const anchor = coords.toScreen(isoX + effectiveW * tp.w, isoY + effectiveD * tp.d, isoZ);
    const drawX  = Math.round(anchor.x - img.width  / 2);
    const drawY  = Math.round(anchor.y - img.height + (options.yOffset || 0));

    ctx.globalAlpha = options.preview ? 0.5 : 1.0;
    ctx.drawImage(img, drawX, drawY);
    ctx.globalAlpha = 1.0;

    // Tile footprint diamond
    const pBack  = coords.toScreen(isoX,             isoY,             isoZ);
    const pRight = coords.toScreen(isoX + effectiveW, isoY,            isoZ);
    const pFront = coords.toScreen(isoX + effectiveW, isoY + effectiveD, isoZ);
    const pLeft  = coords.toScreen(isoX,             isoY + effectiveD, isoZ);

    let strokeColor = null;
    let lineAlpha   = 1.0;
    let lineWidth   = 2;
    if (options.selected)          { strokeColor = '#FFEB3B'; lineWidth = 3; }
    else if (options.valid === true)  { strokeColor = '#4CAF50'; lineAlpha = 0.8; }
    else if (options.valid === false) { strokeColor = '#F44336'; lineAlpha = 0.8; }

    if (strokeColor) {
      ctx.strokeStyle  = strokeColor;
      ctx.lineWidth    = lineWidth;
      ctx.globalAlpha  = lineAlpha;
      ctx.beginPath();
      ctx.moveTo(pBack.x,  pBack.y);
      ctx.lineTo(pRight.x, pRight.y);
      ctx.lineTo(pFront.x, pFront.y);
      ctx.lineTo(pLeft.x,  pLeft.y);
      ctx.closePath();
      ctx.stroke();
      ctx.globalAlpha = 1.0;
    }
  }

  drawFurnitureList(furnitures, selectedId) {
    const sorted = [...furnitures].sort((a,b) => a.sortKey() - b.sortKey());
    for (const f of sorted) {
      const def = FURNITURE_DEFS[f.type];
      const dir = this._rotToDir(f.rotation, def.dirMap);
      const img = def.spriteName ? spriteLoader.get(def.spriteName, dir) : null;
      if (img) {
        this.drawSprite(img, f.x, f.y, f.z, f.effectiveW, f.effectiveD, {
          selected:   f.id === selectedId,
          yOffset:    def.spriteYOffset  || 0,
          tilePivot:  def.tilePivot,
        });
      } else {
        this.drawCube(f.x, f.y, f.z, f.effectiveW, f.effectiveD, f.h, f.color, {
          selected: f.id === selectedId,
        });
      }
    }
  }

  drawPreview(type, tileX, tileY, rotation, baseZ, valid) {
    const def = FURNITURE_DEFS[type];
    let w = def.w, d = def.d;
    if (rotation === 90 || rotation === 270) [w, d] = [d, w];
    const dir = this._rotToDir(rotation, def.dirMap);
    const img = def.spriteName ? spriteLoader.get(def.spriteName, dir) : null;
    if (img) {
      this.drawSprite(img, tileX, tileY, baseZ, w, d, { preview: true, valid, yOffset: def.spriteYOffset || 0, tilePivot: def.tilePivot });
    } else {
      this.drawCube(tileX, tileY, baseZ, w, d, def.h, def.color, { preview: true, valid });
    }
  }
}

// ─────────────────────────────────────────────
// DRAG STATE MACHINE
// ─────────────────────────────────────────────
// States: 'idle' | 'palette-drag' | 'furniture-drag'
class DragController {
  constructor() {
    this.state          = 'idle';
    this.dragType       = null;   // furniture type key for palette-drag
    this.dragRotation   = 0;
    this.dragFurniture  = null;   // Furniture ref for furniture-drag
    this.previewTile    = null;   // { x, y }
    this.previewValid   = false;
    this.previewZ       = 0;
  }

  startPaletteDrag(type) {
    this.state        = 'palette-drag';
    this.dragType     = type;
    this.dragRotation = 0;
    this.previewTile  = null;
  }

  startFurnitureDrag(furniture) {
    this.state         = 'furniture-drag';
    this.dragFurniture = furniture;
    this.dragType      = furniture.type;
    this.dragRotation  = furniture.rotation;
    this.previewTile   = { x: furniture.x, y: furniture.y };
    this.originalX     = furniture.x;
    this.originalY     = furniture.y;
    this.originalZ     = furniture.z;
    this.originalRot   = furniture.rotation;
  }

  cancel() {
    this.state = 'idle';
    this.dragType = null;
    this.dragFurniture = null;
    this.previewTile = null;
  }

  isDragging() { return this.state !== 'idle'; }
}

// ─────────────────────────────────────────────
// GAME
// ─────────────────────────────────────────────
const canvas       = document.getElementById('gameCanvas');
const ctx          = canvas.getContext('2d');
const coords       = new CoordSystem();
const renderer     = new Renderer(ctx);
const history      = new CommandHistory();
const drag         = new DragController();

const spriteLoader = new SpriteLoader();
const _SPRITE_BASE = 'https://raw.githubusercontent.com/rexhsu2406-byte/tax-saver/main/isometric-decorator/assets/furniture/isometric_filtered/';
const _SPRITE_DIRS = ['NE', 'NW', 'SE', 'SW'];
['chair', 'rugSquare', 'table', 'bedDouble', 'bookcaseClosed', 'pottedPlant']
  .forEach(name => spriteLoader.load(name, _SPRITE_DIRS, _SPRITE_BASE));

let furnitures  = [];
let selectedId  = null;
let hoverTile   = null;
let collision   = new CollisionSystem(furnitures);
const roomColors = { wallLeft: '#A89078', wallRight: '#D4BC92', floor: '#E8D5A9' };

function refreshCollision() { collision = new CollisionSystem(furnitures); }
function syncColorInputs() {
  document.getElementById('color-wall-left').value  = roomColors.wallLeft;
  document.getElementById('color-wall-right').value = roomColors.wallRight;
  document.getElementById('color-floor').value      = roomColors.floor;
}
function syncToolbar() {
  document.getElementById('btn-undo').disabled = !history.canUndo();
  document.getElementById('btn-redo').disabled = !history.canRedo();
}

// ── Palette mouse events ──────────────────────
document.querySelectorAll('.palette-item').forEach(el => {
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    const type = el.dataset.type;
    drag.startPaletteDrag(type);
    el.classList.add('dragging-source');
    document.body.style.cursor = 'grabbing';
  });
});

document.addEventListener('mouseup', e => {
  document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('dragging-source'));
  document.body.style.cursor = '';

  if (drag.state === 'palette-drag') {
    if (drag.previewTile && drag.previewValid) {
      const { x, y } = drag.previewTile;
      history.execute(new PlaceCommand(drag.dragType, x, y, drag.previewZ, drag.dragRotation));
    }
    drag.cancel();
  } else if (drag.state === 'furniture-drag') {
    const f = drag.dragFurniture;
    if (drag.previewTile && drag.previewValid) {
      const { x, y } = drag.previewTile;
      const z = drag.previewZ, rot = drag.dragRotation;
      if (x !== drag.originalX || y !== drag.originalY || z !== drag.originalZ || rot !== drag.originalRot) {
        history.execute(new MoveCommand(f, drag.originalX, drag.originalY, drag.originalZ, drag.originalRot, x, y, z, rot));
      }
    }
    drag.cancel();
  }
  updateStatusBar();
});

// ── Canvas mouse events ───────────────────────
canvas.addEventListener('mousemove', e => {
  const rect  = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  const iso = coords.toIso(mx, my);
  const tx = iso.x, ty = iso.y;

  if (tx >= 0 && tx < ROOM_SIZE && ty >= 0 && ty < ROOM_SIZE) {
    hoverTile = { x: tx, y: ty };
  } else {
    hoverTile = null;
  }

  if (drag.isDragging() && hoverTile) {
    drag.previewTile = hoverTile;
    const baseZ = collision.getPlacementZ(
      drag.dragType, tx, ty, drag.dragRotation,
      drag.state === 'furniture-drag' ? drag.dragFurniture.id : null
    );
    drag.previewValid = baseZ >= 0;
    drag.previewZ     = baseZ >= 0 ? baseZ : 0;
  } else if (drag.isDragging()) {
    drag.previewTile  = null;
    drag.previewValid = false;
  }

  document.getElementById('stat-tile').textContent =
    hoverTile ? `${hoverTile.x}, ${hoverTile.y}` : '-, -';
});

canvas.addEventListener('mousedown', e => {
  if (drag.state !== 'idle') return;
  const rect  = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  const iso = coords.toIso(mx, my);

  // Hit-test furniture (reverse sorted = front first)
  const sorted = [...furnitures].sort((a,b) => b.sortKey() - a.sortKey());
  for (const f of sorted) {
    for (const t of f.tiles()) {
      if (t.x === iso.x && t.y === iso.y) {
        selectedId = f.id;
        drag.startFurnitureDrag(f);
        return;
      }
    }
  }
  selectedId = null; // click empty
});

// ── Keyboard events ───────────────────────────
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;

  if (ctrl && e.key === 'z' && !e.shiftKey) { e.preventDefault(); history.undo(); return; }
  if (ctrl && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); history.redo(); return; }

  if (e.key === 'Escape') { drag.cancel(); selectedId = null; return; }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedId !== null && drag.state === 'idle') {
      const f = furnitures.find(f => f.id === selectedId);
      if (f) history.execute(new DeleteCommand(f));
    }
    return;
  }

  if ((e.key === 'r' || e.key === 'R') && drag.state === 'idle' && selectedId !== null) {
    const f = furnitures.find(f => f.id === selectedId);
    if (f) history.execute(new RotateCommand(f, f.rotation, (f.rotation + 90) % 360));
    return;
  }
  if ((e.key === 'r' || e.key === 'R') && drag.isDragging()) {
    drag.dragRotation = (drag.dragRotation + 90) % 360;
  }
});

// ─────────────────────────────────────────────
// SAVE / LOAD
// ─────────────────────────────────────────────
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// Attach a stable saveId to each furniture for serialisation
function ensureSaveId(f) { if (!f.saveId) f.saveId = generateId(); return f.saveId; }

function getSceneData() {
  return {
    version:  '1.0',
    savedAt:  new Date().toISOString(),
    room: {
      width: ROOM_SIZE, height: ROOM_SIZE,
      wallColorLeft:  roomColors.wallLeft,
      wallColorRight: roomColors.wallRight,
      floorColor:     roomColors.floor,
    },
    furniture: furnitures.map(f => ({
      id:       ensureSaveId(f),
      type:     f.type,
      isoX:     f.x, isoY: f.y, isoZ: f.z,
      rotation: f.rotation,
      width:    f.w, depth: f.d, height: f.h,
      color:    f.color,
    })),
  };
}

function loadSceneData(data) {
  furnitures.length = 0;
  selectedId = null;
  roomColors.wallLeft  = data.room.wallColorLeft;
  roomColors.wallRight = data.room.wallColorRight;
  roomColors.floor     = data.room.floorColor;
  for (const d of data.furniture) {
    const f = new Furniture(d.type, d.isoX, d.isoY, d.isoZ);
    f.rotation = d.rotation || 0;
    f.color    = d.color || f.color;
    f.saveId   = d.id;
    furnitures.push(f);
  }
  refreshCollision();
  syncColorInputs();
  history.clear();
  scheduleAutosave();
}

// ── Auto-save (debounce 2 s) ──────────────────
let _autosaveTimer = null;
function scheduleAutosave() {
  clearTimeout(_autosaveTimer);
  _autosaveTimer = setTimeout(() => {
    localStorage.setItem('design_autosave', JSON.stringify(getSceneData()));
  }, 2000);
}

// ── Modal helpers ─────────────────────────────
function showModal(title, slots) {
  const overlay = document.getElementById('modal-overlay');
  const modal   = document.getElementById('modal');
  modal.innerHTML = `<div class="modal-title">${title}</div>` +
    slots.map((s, i) =>
      `<button class="modal-btn" data-idx="${i}" ${s.disabled ? 'disabled' : ''}>${s.label}</button>`
    ).join('') +
    `<button class="modal-btn modal-cancel">Cancel</button>`;
  overlay.style.display = 'flex';
  modal.querySelectorAll('.modal-btn[data-idx]').forEach(btn => {
    const slot = slots[+btn.dataset.idx];
    if (!slot.disabled) btn.addEventListener('click', () => { slot.action(); closeModal(); });
  });
  modal.querySelector('.modal-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); }, { once: true });
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function slotLabel(i) {
  const raw = localStorage.getItem(`design_slot_${i}`);
  if (!raw) return `Slot ${i} — Empty`;
  try {
    const d = JSON.parse(raw);
    return `Slot ${i} — ${new Date(d.savedAt).toLocaleString()} · ${d.furniture.length} items`;
  } catch { return `Slot ${i} — (corrupt)`; }
}

function showSaveDialog() {
  showModal('Save to Slot', [1, 2, 3].map(i => ({
    label:  slotLabel(i),
    action: () => localStorage.setItem(`design_slot_${i}`, JSON.stringify(getSceneData())),
  })));
}

function showLoadDialog() {
  showModal('Load from Slot', [1, 2, 3].map(i => {
    const raw = localStorage.getItem(`design_slot_${i}`);
    return {
      label:    slotLabel(i),
      disabled: !raw,
      action:   () => { try { loadSceneData(JSON.parse(raw)); } catch(e) { console.error(e); } },
    };
  }));
}

// ── Toolbar buttons ───────────────────────────
document.getElementById('btn-undo').addEventListener('click', () => history.undo());
document.getElementById('btn-redo').addEventListener('click', () => history.redo());

document.getElementById('color-wall-left').addEventListener('change', e => {
  const from = roomColors.wallLeft, to = e.target.value;
  if (from !== to) history.execute(new ChangeWallColorCommand('left', from, to));
});
document.getElementById('color-wall-right').addEventListener('change', e => {
  const from = roomColors.wallRight, to = e.target.value;
  if (from !== to) history.execute(new ChangeWallColorCommand('right', from, to));
});
document.getElementById('color-floor').addEventListener('change', e => {
  const from = roomColors.floor, to = e.target.value;
  if (from !== to) history.execute(new ChangeFloorColorCommand(from, to));
});

document.getElementById('btn-save').addEventListener('click', showSaveDialog);
document.getElementById('btn-load').addEventListener('click', showLoadDialog);
document.getElementById('btn-clear').addEventListener('click', () => {
  if (furnitures.length === 0) return;
  history.execute(new ClearCommand());
});

// ─────────────────────────────────────────────
// STATUS BAR
// ─────────────────────────────────────────────
function updateStatusBar() {
  document.getElementById('stat-count').textContent = furnitures.length;
  const hints = {
    'idle': selectedId ? 'Drag to move | R rotate | Del delete | Esc deselect' : 'Click furniture to select | Drag from palette to place',
    'palette-drag': 'Release to place | R to rotate',
    'furniture-drag': 'Release to move | Esc to cancel',
  };
  document.getElementById('stat-hint').textContent = hints[drag.state] || '';
}

// ── Auto-load on startup ──────────────────────
(function() {
  const raw = localStorage.getItem('design_autosave');
  if (raw) { try { loadSceneData(JSON.parse(raw)); } catch(e) {} }
})();

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function gameLoop() {
  renderer.clear();

  if (!spriteLoader.ready) {
    ctx.fillStyle = '#e2b96f';
    ctx.font = 'bold 20px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Loading sprites…', 512, 384);
    requestAnimationFrame(gameLoop);
    return;
  }

  renderer.drawFloor(hoverTile);
  renderer.drawWalls();
  renderer.drawFurnitureList(furnitures, selectedId);

  if (drag.isDragging() && drag.previewTile) {
    renderer.drawPreview(
      drag.dragType,
      drag.previewTile.x,
      drag.previewTile.y,
      drag.dragRotation,
      drag.previewZ,
      drag.previewValid
    );
  }

  updateStatusBar();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
